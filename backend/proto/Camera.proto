syntax = "proto3";

package eih;

message CameraMatrix {
  repeated double data = 1;
}

message DistortionCoefficients {
  repeated double data = 1;
}

message HandEyeArray {
  repeated double data = 1;
}

message CaptureSetting_value {
  int64 value = 1;
  int64 min   = 2;
  int64 max   = 3;
}

message WhiteBalance {
  CaptureSetting_value RedRatio   = 1;
  CaptureSetting_value GreenRatio = 2;
  CaptureSetting_value BlueRatio  = 3;
}

message Information {
  string SerialNumber  = 1;
  string ModelName     = 2;
  string FirmwareVersion = 3;
}

message Intrinsics {
  string FocusValue           = 1;
  int32  ImageWidth           = 2;
  int32  ImageHeight          = 3;
  CameraMatrix CameraMatrix   = 4;
  DistortionCoefficients DistortionCoefficients = 5;
}

message HandEyeParameters {
  HandEyeArray HandEyeArray = 1;
}

message Image {
  message Data {
    bytes EncodeString = 1;
  }
  message Configuration {
    string ImageType   = 1;
    string ImageSize   = 2;
    int32  ImageWidth  = 3;
    int32  ImageHeight = 4;
    string PixelFormat = 5;
  }
}

message CapturingSettings {
  CaptureSetting_value ShutterTime  = 1;
  CaptureSetting_value Gain         = 2;
  WhiteBalance         WhiteBalance = 3;
  CaptureSetting_value Focus        = 4;
  string               ImageSize    = 5;
}

message Camera {
  repeated Intrinsics   intrinsics         = 1;
  HandEyeParameters     handeyeParameters  = 2;
  CapturingSettings     capturingSettings  = 3;
  Image                 image              = 4;
}
